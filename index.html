<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKIN CODE — 男性スキンケア診断</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f7fbff;
    --bg2:       #eef5fd;
    --bg3:       #ddeefa;
    --white:     #ffffff;
    --blue:      #2b7be0;
    --blue-mid:  #1a5eb8;
    --blue-dark: #0f3d8a;
    --blue-light:#dbeafe;
    --blue-pale: #f0f7ff;
    --navy:      #0e2a56;
    --border:    rgba(43,123,224,0.13);
    --border-md: rgba(43,123,224,0.26);
    --text:      #0f1c2e;
    --text-mid:  #2b4a72;
    --muted:     #6b8aab;
    --muted2:    #9eb6cc;
    --danger:    #e05050;
    --danger-bg: rgba(224,80,80,0.07);
    --warn:      #d08030;
    --warn-bg:   rgba(208,128,48,0.08);
    --safe:      #2a9060;
    --safe-bg:   rgba(42,144,96,0.08);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--blue-light), var(--blue), var(--blue-mid), var(--blue-light));
    background-size: 200% 100%; animation: wave 4s linear infinite; z-index: 100;
  }
  @keyframes wave { 0%{background-position:0 0} 100%{background-position:200% 0} }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(circle, rgba(43,123,224,0.08) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .wrap { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 0 1.5rem 5rem; }

  /* Header */
  .site-header { padding: 3rem 0 2rem; border-bottom: 1px solid var(--border-md); margin-bottom: 2.5rem; }
  .logo-row { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 0.5rem; }
  .logo { font-family: 'DM Sans', sans-serif; font-size: clamp(2rem,6vw,2.8rem); font-weight: 500; letter-spacing: 0.06em; color: var(--navy); }
  .logo em { color: var(--blue); font-style: normal; }
  .logo-badge { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.18em; color: var(--blue); text-transform: uppercase; border: 1px solid var(--border-md); background: var(--blue-pale); padding: 0.2rem 0.7rem; border-radius: 50px; margin-bottom: 0.4rem; }
  .header-desc { font-size: 0.86rem; color: var(--muted); line-height: 1.9; max-width: 480px; }

  /* Progress */
  .progress-wrap { margin-bottom: 2rem; }
  .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .progress-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .progress-frac { font-size: 0.78rem; font-weight: 500; color: var(--blue); }
  .progress-track { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue-light), var(--blue)); width: 0%; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); border-radius: 99px; }

  /* Quiz */
  #quiz-screen { animation: fadeup 0.4s ease; }
  @keyframes fadeup { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 0.8rem; }
  .q-step { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; color: var(--white); background: var(--blue); padding: 2px 8px; border-radius: 50px; }
  .q-category { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; }
  .q-text { font-size: clamp(1rem,2.8vw,1.35rem); font-weight: 400; line-height: 1.6; color: var(--navy); margin-bottom: 0.35rem; }
  .q-hint { font-size: 0.74rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.8rem; }
  .opt { display: flex; align-items: flex-start; gap: 12px; padding: 0.85rem 1rem; border: 1px solid var(--border-md); background: var(--white); border-radius: 10px; cursor: pointer; transition: all 0.18s; text-align: left; width: 100%; color: var(--text); }
  .opt:hover { border-color: var(--blue); background: var(--blue-pale); }
  .opt.selected { border-color: var(--blue); background: var(--blue-pale); box-shadow: 0 0 0 3px rgba(43,123,224,0.1); }
  .opt-check { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--border-md); background: var(--white); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.18s; }
  .opt.selected .opt-check { background: var(--blue); border-color: var(--blue); }
  .opt-check-mark { width: 11px; height: 11px; opacity: 0; transition: opacity 0.15s; }
  .opt.selected .opt-check-mark { opacity: 1; }
  .opt-body { flex: 1; }
  .opt-text { font-size: 0.88rem; font-weight: 400; color: var(--text); line-height: 1.4; }
  .opt-sub  { font-size: 0.72rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }

  /* Nav */
  .nav-row { display: flex; gap: 8px; }
  .btn-back { padding: 0.82rem 1.2rem; background: var(--white); border: 1px solid var(--border-md); border-radius: 8px; font-size: 0.8rem; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .btn-back:hover { border-color: var(--blue); color: var(--blue); }
  .btn-next { flex: 1; padding: 0.85rem 1.5rem; background: var(--blue); color: var(--white); border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; }
  .btn-next:hover:not(:disabled) { background: var(--blue-mid); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(43,123,224,0.25); }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Loading */
  #loading-screen { display: none; text-align: center; padding: 4rem 0; animation: fadeup 0.4s ease; }
  .loader-ring-wrap { position: relative; width: 64px; height: 64px; margin: 0 auto 2rem; }
  .loader-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid transparent; border-top-color: var(--blue); animation: spin 1s linear infinite; }
  .loader-ring:nth-child(2) { inset: 8px; border-top-color: var(--blue-light); animation-duration: 0.75s; animation-direction: reverse; }
  .loader-ring:nth-child(3) { inset: 16px; border-top-color: rgba(43,123,224,0.4); animation-duration: 0.5s; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-phase { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; transition: opacity 0.2s; min-height: 1.4rem; }
  .loading-title { font-size: 1rem; font-weight: 500; color: var(--navy); margin-top: 0.4rem; letter-spacing: 0.05em; }

  /* Result */
  #result-screen { display: none; animation: fadeup 0.6s ease; }
  .result-section { background: var(--white); border: 1px solid var(--border-md); border-radius: 14px; overflow: hidden; margin-bottom: 10px; }
  .result-hero { padding: 2rem; background: linear-gradient(135deg, var(--blue-pale) 0%, var(--white) 60%); border-bottom: 1px solid var(--border); }
  .result-eyebrow { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--blue); text-transform: uppercase; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
  .result-eyebrow::before { content: ''; width: 18px; height: 2px; background: var(--blue); border-radius: 99px; }
  .result-type { font-size: clamp(1.4rem,5vw,2.1rem); font-weight: 500; color: var(--navy); letter-spacing: 0.02em; margin-bottom: 0.3rem; }
  .result-type-ja { font-size: 0.78rem; color: var(--blue); font-weight: 400; margin-bottom: 0.8rem; letter-spacing: 0.05em; }
  .result-tagline { font-size: 0.84rem; color: var(--muted); line-height: 1.85; max-width: 480px; }
  .pattern-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.65rem; font-weight: 500; padding: 3px 10px; border-radius: 50px; border: 1px solid; margin-bottom: 1rem; }

  /* Score bars */
  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 1.5rem; }
  @media (max-width: 480px) { .score-grid { grid-template-columns: 1fr; } }
  .score-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .score-label { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .score-val { font-size: 0.62rem; font-weight: 500; color: var(--blue); }
  .score-track { height: 3px; background: var(--bg3); border-radius: 99px; }
  .score-bar { height: 3px; background: linear-gradient(90deg, var(--blue-light), var(--blue)); width: 0%; transition: width 1s cubic-bezier(0.4,0,0.2,1); border-radius: 99px; }

  /* Match scores */
  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 1rem; }
  @media (max-width: 480px) { .match-grid { grid-template-columns: 1fr; } }
  .match-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-size: 0.72rem; }
  .match-item.top { border-color: var(--blue); background: var(--blue-pale); }
  .match-name { flex: 1; color: var(--text-mid); }
  .match-bar-wrap { width: 50px; height: 3px; background: var(--bg3); border-radius: 99px; }
  .match-bar { height: 3px; border-radius: 99px; transition: width 1s ease; }
  .match-pct { font-weight: 500; color: var(--blue); min-width: 28px; text-align: right; }

  /* Share */
  .share-row { display: flex; gap: 6px; margin-top: 1.4rem; }
  .share-btn { display: inline-flex; align-items: center; gap: 5px; padding: 0.42rem 0.9rem; border-radius: 50px; border: 1px solid var(--border-md); font-size: 0.7rem; color: var(--muted); text-decoration: none; cursor: pointer; background: var(--white); transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .share-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-pale); }

  /* Panel */
  .panel { padding: 1.6rem; border-top: 1px solid var(--border); }
  .panel-title { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.18em; color: var(--blue); text-transform: uppercase; margin-bottom: 1.1rem; display: flex; align-items: center; gap: 0.6rem; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Cleansing notice */
  .cleansing-notice { display: flex; align-items: flex-start; gap: 12px; background: var(--blue-pale); border: 1px solid var(--border-md); border-radius: 10px; padding: 1rem 1.1rem; margin-bottom: 1rem; }
  .cleansing-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
  .cleansing-title { font-size: 0.84rem; font-weight: 500; color: var(--blue-mid); margin-bottom: 0.3rem; }
  .cleansing-text  { font-size: 0.78rem; color: var(--text-mid); line-height: 1.7; }

  /* Routine */
  .routine-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 480px) { .routine-cols { grid-template-columns: 1fr; } }
  .routine-col-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.12em; color: var(--white); background: var(--blue); display: inline-block; padding: 2px 10px; border-radius: 50px; margin-bottom: 0.9rem; }
  .routine-col-label.pm { background: var(--navy); }
  .routine-steps { display: flex; flex-direction: column; gap: 7px; }
  .routine-step { display: flex; align-items: flex-start; gap: 10px; padding: 9px 11px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); transition: border-color 0.18s; }
  .routine-step:hover { border-color: var(--border-md); }
  .routine-step.highlight { border-color: var(--blue); background: var(--blue-pale); }
  .step-num { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted2); padding-top: 2px; flex-shrink: 0; }
  .step-name { font-size: 0.82rem; font-weight: 500; color: var(--navy); margin-bottom: 2px; }
  .step-note { font-size: 0.72rem; color: var(--muted); line-height: 1.5; }

  /* Ingredients */
  .ingredient-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .ing-tag { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.06em; padding: 4px 10px; border-radius: 50px; border: 1px solid var(--border-md); color: var(--muted); background: var(--white); transition: all 0.18s; }
  .ing-tag:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-pale); }
  .ing-tag.key { border-color: var(--blue); color: var(--blue-mid); background: var(--blue-pale); font-weight: 500; }

  /* Advice */
  .advice-list { display: flex; flex-direction: column; gap: 11px; }
  .advice-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); }
  .advice-num { width: 24px; height: 24px; border-radius: 50%; background: var(--blue); color: var(--white); font-size: 0.68rem; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .advice-title { font-size: 0.84rem; font-weight: 500; color: var(--navy); margin-bottom: 4px; }
  .advice-text  { font-size: 0.78rem; color: var(--muted); line-height: 1.75; }

  /* CTA */
  .cta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 480px) { .cta-grid { grid-template-columns: 1fr; } }
  .cta-btn { display: flex; align-items: center; gap: 10px; padding: 0.9rem 1rem; border-radius: 10px; border: 1px solid; text-decoration: none; background: transparent; cursor: pointer; transition: all 0.2s; text-align: left; }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(43,123,224,0.12); }
  .cta-primary   { border-color: var(--blue); }
  .cta-primary:hover   { background: var(--blue-pale); }
  .cta-secondary { border-color: var(--border-md); }
  .cta-secondary:hover { border-color: var(--blue); background: var(--blue-pale); }
  .cta-icon { font-size: 1.1rem; flex-shrink: 0; }
  .cta-body { flex: 1; }
  .cta-title-text { font-size: 0.82rem; font-weight: 500; color: var(--navy); margin-bottom: 2px; }
  .cta-desc-text  { font-size: 0.7rem; color: var(--muted); line-height: 1.4; }
  .cta-arr { color: var(--muted2); font-size: 0.8rem; }

  /* Retake */
  .retake-btn { display: block; width: 100%; padding: 0.8rem; text-align: center; font-size: 0.76rem; color: var(--muted); background: var(--white); border: 1px solid var(--border-md); border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-top: 0; }
  .retake-btn:hover { border-color: var(--blue); color: var(--blue); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 99px; }

  /* Product cards */
  .product-grid { display: flex; flex-direction: column; gap: 10px; }
  .product-card { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border: 1px solid var(--border-md); border-radius: 10px; background: var(--white); text-decoration: none; transition: all 0.2s; }
  .product-card:hover { border-color: var(--blue); background: var(--blue-pale); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(43,123,224,0.1); }
  .product-cat { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; color: var(--white); background: var(--blue); padding: 2px 8px; border-radius: 50px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .product-body { flex: 1; }
  .product-name { font-size: 0.85rem; font-weight: 500; color: var(--navy); margin-bottom: 3px; line-height: 1.4; }
  .product-price { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--blue); font-weight: 500; margin-bottom: 4px; display: block; }
  .product-point { font-size: 0.72rem; color: var(--muted); line-height: 1.5; }
  .product-arr { color: var(--muted2); font-size: 0.8rem; flex-shrink: 0; align-self: center; }
  .product-notice { font-size: 0.68rem; color: var(--muted); margin-top: 0.8rem; line-height: 1.6; padding: 8px 10px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="wrap">

  <header class="site-header">
    <div class="logo-row">
      <div class="logo">SKIN<em>CODE</em></div>
      <div class="logo-badge">Men's Skincare Diagnosis</div>
    </div>
    <p class="header-desc">9つの質問に答えるだけで、あなたの肌質・生活習慣に合った完全パーソナライズのスキンケアルーティンを提案します。複数選択可能な項目があります。</p>
  </header>

  <div id="quiz-screen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-label">Progress</span>
        <span class="progress-frac" id="progress-frac">1 / 9</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="q-meta">
      <span class="q-step" id="q-step">Q1</span>
      <span class="q-category" id="q-category"></span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint"></div>
    <div class="options" id="options-wrap"></div>
    <div class="nav-row">
      <button class="btn-back" id="btn-back" onclick="prevQ()">← 戻る</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>次へ →</button>
    </div>
  </div>

  <div id="loading-screen">
    <div class="loader-ring-wrap">
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
    </div>
    <div class="loading-phase" id="loading-phase">Analyzing skin profile</div>
    <div class="loading-title">診断中...</div>
  </div>

  <div id="result-screen"></div>
</div>

<script>
// ─────────────────────────────────────────────
// QUESTIONS
// ─────────────────────────────────────────────
const QUESTIONS = [
  {
    id:'afterwash', category:'肌タイプ',
    text:'洗顔後、何もつけないでいると肌はどうなりますか？',
    hint:'（1つ選んでください）', multi:false,
    options:[
      {text:'すぐにつっぱる・乾燥する',           sub:'インナードライの可能性あり',  value:'dry'},
      {text:'しばらくするとテカってくる',           sub:'皮脂分泌が多め',             value:'oily'},
      {text:'Tゾーンのみテカる・頬は普通〜乾燥', sub:'混合肌の典型',               value:'combo'},
      {text:'とくに変わらず快適',                  sub:'バランスが取れている',       value:'normal'},
    ]
  },
  {
    id:'trouble', category:'肌の悩み',
    text:'現在気になる肌の悩みをすべて選んでください。',
    hint:'（複数選択可）', multi:true,
    options:[
      {text:'ニキビ・吹き出物が出やすい', sub:'炎症・皮脂コントロールが課題',   value:'acne'},
      {text:'毛穴の開き・黒ずみ',         sub:'皮脂詰まりが主な原因',           value:'pore'},
      {text:'くすみ・色ムラ・シミ',       sub:'ターンオーバーの乱れ',           value:'dull'},
      {text:'乾燥・肌荒れ・かさつき',     sub:'バリア機能の低下',               value:'dry_c'},
      {text:'シワ・たるみが気になる',      sub:'エイジングサイン',               value:'aging'},
      {text:'肌のべたつき',               sub:'過剰皮脂分泌',                   value:'sebum'},
      {text:'肌が敏感・刺激に弱い',       sub:'ストレス・環境による反応性',      value:'sensitive'},
    ]
  },
  {
    id:'daily_items', category:'デイリー習慣',
    text:'日常的に使っているものをすべて選んでください。',
    hint:'（複数選択可）クレンジング推奨の判定に使用します', multi:true,
    options:[
      {text:'日焼け止め（毎日使う）',              sub:'ウォータープルーフ含む',         value:'sunscreen'},
      {text:'整髪料・ワックス（前髪に触れる）',    sub:'毛穴詰まりの原因になりやすい',   value:'wax'},
      {text:'BBクリーム・ファンデーション',        sub:'カバー系コスメ使用',             value:'makeup'},
      {text:'日焼け止め入り保湿クリーム',          sub:'UVカット機能付き',               value:'uv_cream'},
      {text:'これらは使っていない',                sub:'',                              value:'none', exclusive:true},
    ]
  },
  {
    id:'lifestyle', category:'ライフスタイル',
    text:'日常の環境・習慣で当てはまるものを選んでください。',
    hint:'（複数選択可）', multi:true,

// ─────────────────────────────────────────────
// SCORING ENGINE
// ─────────────────────────────────────────────
function rankPatterns(answers) {
  return PATTERNS
    .map(p => ({ ...p, raw: p.score(answers) }))
    .sort((a,b) => b.raw - a.raw);
}

function normalizeScores(ranked) {
  const max = ranked[0].raw || 1;
  return ranked.map(p => ({ ...p, pct: Math.round(p.raw / max * 100) }));
}

// ─────────────────────────────────────────────
// CLEANSING LOGIC
// ─────────────────────────────────────────────
function needsCleansing(answers) {
  const daily = answers.daily_items || [];
  if(daily.includes('none') || daily.length === 0) return {needed:false};
  const triggers = [];
  if(daily.includes('sunscreen'))  triggers.push('日焼け止め');
  if(daily.includes('uv_cream'))   triggers.push('UVカット入りクリーム');
  if(daily.includes('makeup'))     triggers.push('BBクリーム・ファンデーション');
  if(daily.includes('wax'))        triggers.push('整髪料（前髪への付着）');
  return triggers.length > 0 ? {needed:true, triggers} : {needed:false};
}

// INGREDIENT BUILDER
// ─────────────────────────────────────────────
function buildIngredients(answers, patternId) {
  const trouble = answers.trouble || [];
  const items = [];
  const add = (name, key) => { if(!items.find(i=>i.name===name)) items.push({name,key}); };

  if(['oily_acne','stressed'].includes(patternId) || trouble.includes('acne')) {
    add('ナイアシンアミド', true); add('BHA（サリチル酸）', true);
    add('ティーツリー', false); add('アゼライン酸', false);
  }
  if(['dry_sensitive'].includes(patternId) || trouble.includes('dry_c')) {
    add('セラミド', true); add('ヒアルロン酸', true);
    add('スクワラン', false); add('シアバター', false);
  }
  if(['glow','outdoor_uv'].includes(patternId) || trouble.includes('dull')) {
    add('ビタミンC誘導体', true); add('トラネキサム酸', false);
    add('アルブチン', false);
  }
  if(['aging','combo_aging'].includes(patternId) || trouble.includes('aging')) {
    add('レチノール', true); add('ペプチド', true);
    add('コエンザイムQ10', false);
  }
  if(trouble.includes('pore') || patternId === 'combo') {
    add('AHA（グリコール酸）', true); add('クレイ（高嶺土）', false);
  }
  if(patternId === 'stressed') {
    add('アズレン', true); add('パンテノール', true); add('アラントイン', false);
  }
  add('SPF/PA++', true);
  add('ヒアルロン酸', false);
  add('グリセリン', false);
  return items;
}

}

  const life   = answers.lifestyle || [];

  return [
    {

      val: isDry ? 25 : isOily ? 55 : 72,
      note: isDry ? 'Low' : isOily ? 'Mid' : 'Good'
    },
    {
      label:'Sebum',
      val: isOily ? 88 : answers.afterwash?.includes('combo') ? 60 : 32,
      note: isOily ? 'High' : answers.afterwash?.includes('combo') ? 'Mid' : 'Low'
    },
    {

      val: answers.trouble?.includes('sensitive') ? 82 :
           life.includes('irregular') || life.includes('smoking') ? 65 :

      note: answers.trouble?.includes('sensitive') ? 'High' : 'Normal'

    },

let currentQ = 0;
const answers = {};

// ─────────────────────────────────────────────
// RENDER QUESTION
// ─────────────────────────────────────────────
function renderQ() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;

  document.getElementById('q-step').textContent = 'Q' + (currentQ+1);
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = q.hint || '';
  document.getElementById('progress-frac').textContent = (currentQ+1) + ' / ' + total;
  document.getElementById('progress-fill').style.width = (currentQ / total * 100) + '%';
  document.getElementById('btn-back').style.visibility = currentQ === 0 ? 'hidden' : 'visible';

  const sel = answers[q.id] || [];
  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';

  q.options.forEach(opt => {
    const isSelected = sel.includes(opt.value);
    const btn = document.createElement('button');
    btn.className = 'opt' + (isSelected ? ' selected' : '');
    btn.dataset.value = opt.value;
    btn.innerHTML = `
      <span class="opt-check">
        <svg class="opt-check-mark" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="opt-body">
        <span class="opt-text">${opt.text}</span>
        ${opt.sub ? `<span class="opt-sub">${opt.sub}</span>` : ''}
      </span>`;
    btn.onclick = () => toggleOpt(q, opt, btn);
    wrap.appendChild(btn);
  });

  updateNextBtn(q);
  const qs = document.getElementById('quiz-screen');
  qs.style.animation = 'none';
  void qs.offsetWidth;
  qs.style.animation = 'fadeup 0.35s ease';
}

function toggleOpt(q, opt, btn) {
  if(!answers[q.id]) answers[q.id] = [];
  const vals = answers[q.id];

  if(q.multi) {
    if(opt.exclusive) {
      answers[q.id] = vals.includes(opt.value) ? [] : [opt.value];
    } else {
      answers[q.id] = vals.filter(v => !q.options.find(o => o.value===v && o.exclusive));
      if(vals.includes(opt.value)) answers[q.id] = answers[q.id].filter(v => v !== opt.value);
      else answers[q.id].push(opt.value);
    }
  } else {
    answers[q.id] = [opt.value];
  }

  document.querySelectorAll('.opt').forEach(b => {
    b.classList.toggle('selected', answers[q.id].includes(b.dataset.value));
  });
  updateNextBtn(q);
}

function updateNextBtn(q) {
  document.getElementById('btn-next').disabled = !(answers[q.id]?.length > 0);
}

function nextQ() {
  if(!(answers[QUESTIONS[currentQ].id]?.length > 0)) return;
  if(currentQ < QUESTIONS.length - 1) { currentQ++; renderQ(); }
  else showLoading();
}

function prevQ() {
  if(currentQ > 0) { currentQ--; renderQ(); }
}

      <div class="panel">
        <div class="panel-title">あなたへのおすすめ商品</div>
        <div class="product-grid">
          ${buildProducts(top.id).map(p=>`
            <a href="${p.url}" class="product-card" target="_blank" rel="noopener sponsored">
              <div class="product-cat">${p.cat}</div>
              <div class="product-body">
                <div class="product-name">${p.name}</div>
                <div class="product-price">${p.price}</div>
                <div class="product-point">${p.point}</div>
              </div>
              <div class="product-arr">→</div>
            </a>`).join('')}
        </div>
        <p class="product-notice">※ リンク先はアフィリエイト広告を含みます。診断結果に基づく推奨ですが、肌の状態には個人差があります。購入前に成分・使用上の注意をご確認ください。</p>
      </div>
    </div>

    <div class="result-section">
      <div class="panel">
        <div class="panel-title">Next Step</div>
        <div class="cta-grid">
          ${ctas.map(c=>`
            <a href="${c.url}" class="cta-btn ${c.cls}">
              <div class="cta-icon">${c.icon}</div>
              <div class="cta-body">
                <div class="cta-title-text">${c.title}</div>
                <div class="cta-desc-text">${c.desc}</div>
              </div>
              <div class="cta-arr">→</div>
            </a>`).join('')}
        </div>
      </div>
    </div>

    <button class="retake-btn" onclick="retake()">← もう一度診断する</button>
  `;

  document.getElementById('loading-screen').style.display = 'none';
  el.style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});

  setTimeout(() => {
    el.querySelectorAll('.score-bar').forEach(b => b.style.width = b.dataset.val + '%');
    el.querySelectorAll('.match-bar').forEach(b => b.style.width = b.dataset.val + '%');
  }, 300);

  const shareText = `【SKINCODE診断】私の肌タイプ → ${top.name}（${top.ja}）\n${top.tagline.slice(0,40)}…\n`;
  const xBtn = el.querySelector('#share-x');
  if(xBtn) xBtn.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(location.href)}`;
}

function copyResult(name, ja) {
  navigator.clipboard.writeText(`【SKINCODE診断】肌タイプ：${name}（${ja}）\n${location.href}`).then(() => {
    const btn = document.getElementById('copy-btn');
    if(btn) { btn.textContent = '✓ コピー完了'; setTimeout(() => { btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> コピー'; }, 2000); }
  });
}

function retake() {
  currentQ = 0;
  Object.keys(answers).forEach(k => delete answers[k]);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('result-screen').innerHTML = '';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQ();
  window.scrollTo({top:0, behavior:'smooth'});
}

renderQ();
</script>
</body>
</html>
